<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARDRO</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="./javaScript/script.js" defer></script>
    <link rel="apple-touch-icon" href="media/imgs/appIcon.png">
</head>
<body>
    <!-- Header -->
    <header>
        <img src="media/imgs/logo.png" alt="logo">
    </header>
    
    <div class="pages-container">
        <!-- Page 0: Add Item -->
        <div class="page page-0" id="page-0">
            <div class="page-content">
                <h1>Add Item</h1>
                <p>Add Item Seite</p>
            </div>
        </div>

        <!-- Page 1: Main -->
        <div class="page page-1 active" id="page-1">
            <div class="page-content">
                <main>
                    <img id="bp_1" onclick="bodyTouched(1);" src="media/imgs/menukreis.png" alt="wardro">
                </main>
                <img id="left-btn" src="media/imgs/leftbtn.png" alt="btn">
                <img id="right-btn" src="media/imgs/rightbtn.png" alt="btn">
            </div>
        </div>

        <!-- Page 2: Profil -->
        <div class="page page-2" id="page-2">
            <div class="page-content">
                <h1>Profil</h1>
                <p>Profil Seite</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="page-footer">
        <div class="nav-dots">
            <div class="dot" data-page="0" id="dot-0"></div>
            <div class="dot" data-page="1" id="dot-1"></div>
            <div class="dot" data-page="2" id="dot-2"></div>
        </div>
    </footer>
</body>
</html>
